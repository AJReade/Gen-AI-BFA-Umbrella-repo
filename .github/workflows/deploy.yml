name: Sync to Hugging Face hub
on:
  push:
    branches: [deploy]
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1
          lfs: true
      - name: Enable Xet and push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub[hf_xet]
          curl -s -X PUT \
            "https://huggingface.co/api/spaces/mvp-lab/VTON_TEST/settings" \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"xetEnabled": true}'
          git config user.email "deploy@github.com"
          git config user.name "Deploy Bot"
          git checkout --orphan hf-clean
          git add -A
          git commit -m "deploy"
          git push https://mvp-lab:$HF_TOKEN@huggingface.co/spaces/mvp-lab/VTON_TEST hf-clean:main -f